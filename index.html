<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langer Dystrybucja — hurtowa dystrybucja chemii budowlanej</title>
  <meta name="description" content="Hurtowa dystrybucja chemii budowlanej: piany montażowe, silikony, akryle, kleje i akcesoria dla sklepów, hurtowni i ekip wykonawczych." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ===== BRAND TOKENS ===== */
:root {
  --flame:        #F04E23;
  --flame-600:    #D63F18;
  --flame-700:    #B63411;
  --flame-tint:   #FBE7DF;
  --flame-glow:   #FF6A3D;
  --cobalt:       #1E3FB5;
  --cobalt-600:   #182F95;
  --cobalt-tint:  #E5E9F8;
  --navy:         #0E1533;
  --navy-800:     #161E45;
  --navy-700:     #232C5E;
  --navy-900:     #080C22;
  --ash:          #8B9199;
  --ash-700:      #565D67;
  --light:        #EEF0F3;
  --paper:        #F6F7F9;
  --white:        #FFFFFF;
  --line:         #E2E5EA;
  --line-2:       #CFD4DC;
  --font-display: 'Space Grotesk', 'Hanken Grotesk', system-ui, sans-serif;
  --font-text:    'Hanken Grotesk', 'Helvetica Neue', Arial, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, Menlo, monospace;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px; --s9:96px; --s10:128px;
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:24px; --r-full:999px;
  --e1: 0 1px 2px rgb(14 21 51 / 0.06), 0 1px 1px rgb(14 21 51 / 0.04);
  --e2: 0 18px 48px -16px rgb(14 21 51 / 0.22), 0 6px 16px -8px rgb(14 21 51 / 0.10);
  --e-flame: 0 16px 40px -12px rgb(240 78 35 / 0.45);
  --max: 1240px;
  --header-h: 76px;
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 16px); }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--navy);
  font-family: var(--font-text);
  font-size: 17px;
  line-height: 1.6;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
::selection { background: var(--flame); color: #fff; }

.wrap { width: 100%; max-width: var(--max); margin: 0 auto; padding-inline: 32px; }
@media (max-width: 760px){ .wrap { padding-inline: 20px; } }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--flame);
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before { content:''; width: 22px; height: 2px; background: var(--flame); display:inline-block; }
.eyebrow.on-dark { color: var(--flame-glow); }

h1,h2,h3,h4 { font-family: var(--font-display); margin: 0; line-height: 1.02; letter-spacing: -0.03em; font-weight: 700; }
.display { font-size: clamp(44px, 7vw, 92px); line-height: 0.94; letter-spacing: -0.04em; }
.h-sec   { font-size: clamp(32px, 4.4vw, 56px); letter-spacing: -0.035em; }
.lead { font-size: clamp(17px, 2vw, 21px); line-height: 1.55; color: var(--ash-700); font-weight: 400; }
.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:10px;
  font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing:-0.01em;
  padding: 15px 26px; border-radius: var(--r-sm); transition: transform .12s, background .15s, box-shadow .15s, color .15s;
  white-space: nowrap; }
.btn svg { width: 18px; height: 18px; }
.btn-flame { background: var(--flame); color:#fff; box-shadow: var(--e-flame); }
.btn-flame:hover { background: var(--flame-600); transform: translateY(-2px); }
.btn-flame:active { background: var(--flame-700); transform: translateY(0); }
.btn-dark { background: var(--navy); color:#fff; }
.btn-dark:hover { background: var(--navy-800); transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--navy); border: 1.5px solid var(--line-2); }
.btn-ghost:hover { border-color: var(--navy); background: var(--white); }
.btn-ghost.on-dark { color:#fff; border-color: rgb(255 255 255 / 0.28); }
.btn-ghost.on-dark:hover { border-color:#fff; background: rgb(255 255 255 / 0.08); }

.chip { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600;
  padding: 7px 14px; border-radius: var(--r-full); border:1px solid var(--line-2); color: var(--ash-700);
  background: var(--white); transition: all .12s; cursor:pointer; }
.chip:hover { border-color: var(--navy); color: var(--navy); }
.chip.active { background: var(--navy); color:#fff; border-color: var(--navy); }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,0,0,1), transform .7s cubic-bezier(.2,0,0,1); }
.reveal.in { opacity: 1; transform: none; }
@media (prefers-reduced-motion: reduce){ .reveal { opacity:1; transform:none; transition:none; } html{scroll-behavior:auto;} }

/* ===== HEADER ===== */
.hdr { position: fixed; inset: 0 0 auto 0; height: var(--header-h); z-index: 100;
  display: flex; align-items: center; transition: background .25s, box-shadow .25s, border-color .25s;
  border-bottom: 1px solid transparent; }
.hdr-solid { background: rgba(246,247,249,.86); backdrop-filter: blur(12px); border-bottom-color: var(--line); }
.hdr-in { display: flex; align-items: center; gap: 24px; width: 100%; }
.logo { display: inline-flex; align-items: center; gap: 12px; }
.logo-words { display: flex; flex-direction: column; line-height: 1; }
.logo-name { font-family: var(--font-display); font-weight: 700; font-size: 21px; letter-spacing: -0.02em; }
.logo-sub { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.28em; margin-top: 3px; }
.hdr-nav { display: flex; gap: 4px; margin-left: auto; }
.hdr-link { font-weight: 600; font-size: 15px; padding: 9px 14px; border-radius: var(--r-sm); color: inherit; transition: background .12s, color .12s; }
.hdr:not(.hdr-solid) .hdr-link { color: #fff; }
.hdr:not(.hdr-solid) .logo { color: #fff !important; }
.hdr-link:hover { color: var(--flame); }
.hdr-cta { display: flex; }
.hdr-burger { display: none; color: inherit; padding: 6px; }
.hdr:not(.hdr-solid) .hdr-burger { color: #fff; }
.mobile-menu { position: fixed; inset: 0; background: rgba(8,12,34,.5); z-index: 200; }
.mobile-sheet { position: absolute; top: 0; right: 0; height: 100%; width: min(320px, 86vw); background: var(--white);
  padding: 24px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--e2); }
.mm-close { align-self: flex-end; padding: 8px; color: var(--navy); margin-bottom: 12px; }
.mm-link { font-family: var(--font-display); font-weight: 600; font-size: 20px; padding: 12px 4px; border-bottom: 1px solid var(--line); }

/* ===== HERO ===== */
.hero { position: relative; overflow: hidden; }
.hero-h { color: #fff; max-width: 14ch; margin-bottom: 8px; }
.hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 36px; }
.hstats { display: grid; grid-template-columns: repeat(4, auto); gap: 40px; margin-top: 56px; }
.hstat-n { font-family: var(--font-display); font-weight: 700; font-size: clamp(28px,3vw,40px); letter-spacing: -0.03em; line-height: 1; }
.hstat-l { font-size: 14px; color: var(--ash-700); margin-top: 6px; font-weight: 500; }
.hstats.on-dark .hstat-n { color: #fff; }
.hstats.on-dark .hstat-l { color: rgba(255,255,255,.6); }

.hero-navy { background: var(--navy); padding: calc(var(--header-h) + 80px) 0 100px; }
.hero-navy-in { position: relative; z-index: 2; }
.hero-grid-bg { position: absolute; inset: 0; opacity: .5;
  background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
  background-size: 56px 56px; -webkit-mask-image: radial-gradient(ellipse 80% 70% at 70% 0%, #000, transparent 75%); mask-image: radial-gradient(ellipse 80% 70% at 70% 0%, #000, transparent 75%); }
.hero-navy::after { content:''; position:absolute; top:-160px; right:-120px; width:520px; height:520px; border-radius:50%;
  background: radial-gradient(circle, rgba(240,78,35,.28), transparent 65%); filter: blur(20px); }

.hero-poster { background: var(--flame); padding: calc(var(--header-h) + 80px) 0 96px; }
.hero-poster-in { position: relative; z-index: 2; }
.hero-watermark { position: absolute; right: -120px; bottom: -160px; color: rgba(14,21,51,.10); z-index: 1; }

.hero-split { display: grid; grid-template-columns: 1.15fr .85fr; min-height: 92vh; }
.hero-split-l { background: var(--navy); display: flex; align-items: center; padding: calc(var(--header-h) + 40px) 0 60px; }
.hero-split-inner { max-width: 620px; margin-left: auto; padding: 0 56px 0 max(32px, calc((100vw - var(--max))/2 + 32px)); }
.hero-split-r { background: var(--flame); position: relative; display: flex; flex-direction: column; justify-content: center; gap: 40px; padding: 60px; overflow: hidden; }
.hero-split-mark { color: rgba(14,21,51,.14); position: absolute; top: -40px; right: -40px; }
.hero-split-r .hstats { grid-template-columns: repeat(2, auto); position: relative; z-index: 2; gap: 32px 48px; }
.hero-split-r .hstat-n { color: var(--navy); }
.hero-split-r .hstat-l { color: rgba(14,21,51,.7); }

/* ===== MARQUEE ===== */
.marquee { background: var(--navy-900); color: #fff; overflow: hidden; padding: 18px 0; }
.marquee-track { display: flex; gap: 0; white-space: nowrap; width: max-content; animation: marq 34s linear infinite; }
.marquee-item { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: 0.02em; padding: 0 6px; display: inline-flex; align-items: center; gap: 28px; color: rgba(255,255,255,.85); }
.marquee-dot { color: var(--flame); font-size: 22px; }
@keyframes marq { to { transform: translateX(-50%); } }
@media (prefers-reduced-motion: reduce){ .marquee-track { animation: none; } }

/* ===== SECTIONS ===== */
.sec { padding: 104px 0; }
.sec-head { max-width: 760px; margin-bottom: 56px; }
.sec-head .eyebrow { margin-bottom: 20px; }
.sec-dark { background: var(--navy); }
.sec-base { background: var(--light); }

.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.why-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px; transition: transform .2s, box-shadow .2s, border-color .2s; }
.why-card:hover { transform: translateY(-4px); box-shadow: var(--e2); border-color: transparent; }
.why-ic { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: var(--r-md); background: var(--flame-tint); color: var(--flame); margin-bottom: 20px; }
.why-t { font-size: 20px; margin-bottom: 10px; letter-spacing: -0.02em; }
.why-d { color: var(--ash-700); font-size: 15.5px; line-height: 1.55; }

.proc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.proc-step { position: relative; padding-top: 28px; border-top: 2px solid rgba(255,255,255,.16); }
.proc-step::before { content:''; position:absolute; top:-2px; left:0; width: 64px; height: 2px; background: var(--flame); }
.proc-n { font-family: var(--font-display); font-weight: 700; font-size: 40px; color: var(--flame); letter-spacing: -0.03em; line-height: 1; margin-bottom: 16px; }
.proc-t { color: #fff; font-size: 21px; margin-bottom: 10px; letter-spacing: -0.02em; }
.proc-d { color: rgba(255,255,255,.65); font-size: 15px; line-height: 1.55; }

.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.cat-card { display: flex; align-items: flex-start; gap: 20px; background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 28px; transition: transform .2s, box-shadow .2s, border-color .2s; }
.cat-card:hover { transform: translateY(-4px); box-shadow: var(--e2); border-color: transparent; }
.cat-ic { flex: none; display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: var(--r-md); background: var(--light); color: var(--navy); }
.cat-card:hover .cat-ic { background: var(--flame); color: #fff; }
.cat-body { flex: 1; }
.cat-t { font-size: 21px; margin-bottom: 8px; letter-spacing: -0.02em; }
.cat-d { color: var(--ash-700); font-size: 14.5px; line-height: 1.5; }
.cat-go { color: var(--ash); flex: none; transition: transform .2s, color .2s; }
.cat-card:hover .cat-go { color: var(--flame); transform: translate(3px,-3px); }
.cat-card-all { flex-direction: column; justify-content: space-between; gap: 24px; background: var(--navy); border-color: var(--navy); min-height: 180px; }
.cat-card-all:hover { box-shadow: var(--e2); }

/* ===== CONTACT ===== */
.sec-contact { background: var(--white); border-top: 1px solid var(--line); }
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: start; }
.contact-list { list-style: none; padding: 0; margin: 36px 0 0; display: flex; flex-direction: column; gap: 18px; }
.contact-list li { display: flex; align-items: center; gap: 16px; }
.ci { flex: none; width: 48px; height: 48px; border-radius: var(--r-md); background: var(--navy); color: #fff; display: inline-flex; align-items: center; justify-content: center; }
.ci-k { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ash); }
.ci-v { font-size: 17px; font-weight: 600; color: var(--navy); }
.form { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 32px; display: flex; flex-direction: column; gap: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 7px; }
.field span { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ash-700); font-weight: 600; }
.field input, .field textarea { font-family: var(--font-text); font-size: 16px; color: var(--navy); background: var(--white); border: 1.5px solid var(--line-2); border-radius: var(--r-sm); padding: 13px 15px; transition: border-color .15s, box-shadow .15s; resize: vertical; }
.field input:focus, .field textarea:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(14,21,51,.08); }
.field input::placeholder, .field textarea::placeholder { color: var(--ash); }
.form-note { font-size: 12.5px; color: var(--ash); text-align: center; margin: 4px 0 0; }
.form-done { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 48px 32px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.form-done-ic { width: 64px; height: 64px; border-radius: 50%; background: var(--flame-tint); color: var(--flame); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; }

/* ===== FOOTER ===== */
.footer { background: var(--navy-900); color: #fff; padding: 72px 0 32px; }
.footer-in { display: grid; grid-template-columns: 1.3fr 2fr; gap: 56px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,.12); }
.footer-tag { color: rgba(255,255,255,.6); font-size: 15px; max-width: 360px; margin-top: 20px; line-height: 1.6; }
.footer-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
.footer-col { display: flex; flex-direction: column; gap: 11px; }
.footer-h { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--flame-glow); margin-bottom: 6px; }
.footer-col a, .footer-col span { color: rgba(255,255,255,.7); font-size: 15px; transition: color .12s; }
.footer-col a:hover { color: #fff; }
.footer-bottom { display: flex; justify-content: space-between; padding-top: 28px; color: rgba(255,255,255,.45); font-size: 13px; }

/* ===== CATALOG ===== */
.base-toolbar { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; }
.search { flex: 1; display: flex; align-items: center; gap: 12px; background: var(--white); border: 1.5px solid var(--line-2); border-radius: var(--r-sm); padding: 0 16px; transition: border-color .15s, box-shadow .15s; }
.search:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(14,21,51,.08); }
.search svg { color: var(--ash); flex: none; }
.search input { flex: 1; border: none; outline: none; background: none; font-family: var(--font-text); font-size: 16px; padding: 15px 0; color: var(--navy); }
.search input::placeholder { color: var(--ash); }
.search-x { color: var(--ash); display: inline-flex; padding: 4px; }
.search-x:hover { color: var(--navy); }
.sortbox { display: flex; align-items: center; gap: 10px; flex: none; }
.sortbox label { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ash-700); font-weight: 600; }
.sortbox select { font-family: var(--font-text); font-size: 15px; font-weight: 600; color: var(--navy); background: var(--white); border: 1.5px solid var(--line-2); border-radius: var(--r-sm); padding: 13px 14px; cursor: pointer; }
.sortbox select:focus { outline: none; border-color: var(--navy); }
.filters { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.filter-line { display: flex; align-items: baseline; gap: 16px; }
.filter-k { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ash-700); font-weight: 600; flex: none; width: 84px; padding-top: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.base-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; font-size: 15px; color: var(--ash-700); font-weight: 600; }
.base-meta .num { color: var(--navy); font-size: 18px; }
.base-clear { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--flame); border: 1px solid var(--flame-tint); background: var(--flame-tint); padding: 6px 12px; border-radius: var(--r-full); }
.base-clear:hover { background: var(--flame); color: #fff; }
.pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.pcard { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s, border-color .2s; }
.pcard:hover { transform: translateY(-4px); box-shadow: var(--e2); border-color: transparent; }
.pcard-img { position: relative; aspect-ratio: 16/11; display: flex; align-items: center; justify-content: center; }
.pcard-imgtag { position: absolute; bottom: 10px; right: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: currentColor; opacity: .55; }
.pbadge { position: absolute; top: 12px; left: 12px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 5px 9px; border-radius: var(--r-full); color: #fff; }
.role-magnet { background: var(--flame); }
.role-margin { background: var(--cobalt); }
.role-premium { background: var(--navy); }
.pcard-body { padding: 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.pcard-brand { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ash); font-weight: 600; }
.pcard-name { font-size: 17px; line-height: 1.2; letter-spacing: -0.02em; }
.pcard-variant { font-size: 13.5px; color: var(--ash-700); margin-top: -2px; }
.pcard-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
.ptag { font-size: 11px; font-weight: 600; color: var(--ash-700); background: var(--light); border-radius: var(--r-full); padding: 3px 9px; }
.pcard-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line); display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
.pcard-pack { font-size: 13px; font-weight: 600; color: var(--navy); }
.pcard-sku { font-size: 11.5px; color: var(--ash); margin-top: 2px; }
.pcard-ask { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; color: var(--flame); white-space: nowrap; }
.pcard-ask:hover { color: var(--flame-600); }
.empty { text-align: center; padding: 72px 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: var(--white); border: 1px dashed var(--line-2); border-radius: var(--r-lg); }
.empty-ic { width: 64px; height: 64px; border-radius: 50%; background: var(--light); color: var(--ash); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; }

/* ===== RESPONSIVE ===== */

  .why-grid, .cat-grid { grid-template-columns: repeat(2, 1fr); }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      panel.style.right = offsetRef.current.x + 'px';
      panel.style.bottom = offsetRef.current.y + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRow({ label, children }) {
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row" style={{ flexDirection:'row', alignItems:'center', justifyContent:'space-between', gap:10 }}>
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const idx = Math.max(0, options.indexOf(value));
  const n = options.length;
  return (
    <TweakRow label={label}>
      <div role="radiogroup" className="twk-seg">
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {options.map((o) => (
          <button key={o} type="button" role="radio" aria-checked={o === value} onClick={() => onChange(o)}>{o}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" data-on={on ? '1' : '0'}
              style={{ background: o }} onClick={() => onChange(o)}>
              {on && (
                <svg viewBox="0 0 14 14" aria-hidden="true">
                  <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke="#fff" />
                </svg>
              )}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function ProductDatabase({ initialCatRef }) {
  const [q, setQ] = useState('');
  const [cat, setCat] = useState('all');
  const [brand, setBrand] = useState('all');
  const [sort, setSort] = useState('name');

  React.useEffect(() => {

  }, [initialCatRef]);

  const results = useMemo(() => {
    let r = PRODUCTS.filter(p => {
      if (cat !== 'all' && p.category !== cat) return false;
      if (brand !== 'all' && p.brand !== brand) return false;
      if (q.trim()) {
        const s = (p.name + ' ' + p.brand + ' ' + p.sku + ' ' + p.variant + ' ' + p.tags.join(' ')).toLowerCase();
        if (!s.includes(q.trim().toLowerCase())) return false;
      }
      return true;
    });
    if (sort === 'name') r = [...r].sort((a,b) => a.name.localeCompare(b.name,'pl'));
    if (sort === 'brand') r = [...r].sort((a,b) => a.brand.localeCompare(b.brand,'pl') || a.name.localeCompare(b.name,'pl'));
    return r;
  }, [q, cat, brand, sort]);

  const active = q || cat !== 'all' || brand !== 'all';
  const clear = () => { setQ(''); setCat('all'); setBrand('all'); };

  return (
    <section id="baza" className="sec sec-base">
      <div className="wrap">
        <div className="sec-head reveal">
          <span className="eyebrow">Baza produktów</span>
          <h2 className="h-sec">Przeszukaj cały katalog.</h2>
          <p className="lead" style={{ maxWidth:560, marginTop:14 }}>
            Wersja beta — ceny hurtowe pokazujemy po zalogowaniu. Filtruj po kategorii i marce, a o cenę pytaj jednym kliknięciem.
          </p>
        </div>

        <div className="base-toolbar">
          <div className="search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
            <input value={q} onChange={e => setQ(e.target.value)} placeholder={'Szukaj: nazwa, marka, SKU, np. „silikon sanitarny"…'} />
            {q && <button className="search-x" onClick={() => setQ('')} aria-label="Wyczyść"><IX s={18}/></button>}
          </div>
          <div className="sortbox">
            <label>Sortuj</label>
            <select value={sort} onChange={e => setSort(e.target.value)}>
              <option value="name">Nazwa A–Z</option>
              <option value="brand">Marka</option>
            </select>
          </div>
        </div>

        <div className="filters">
          <div className="filter-line">
            <span className="filter-k">Kategoria</span>
            <div className="chips">
              <button className={'chip' + (cat==='all'?' active':'')} onClick={() => setCat('all')}>Wszystkie</button>
              {CATEGORIES.map(c => (
                <button key={c.id} className={'chip' + (cat===c.id?' active':'')} onClick={() => setCat(c.id)}>{c.label}</button>
              ))}
            </div>
          </div>
          <div className="filter-line">
            <span className="filter-k">Marka</span>
            <div className="chips">
              <button className={'chip' + (brand==='all'?' active':'')} onClick={() => setBrand('all')}>Wszystkie</button>
              {BRANDS.map(b => (
                <button key={b} className={'chip' + (brand===b?' active':'')} onClick={() => setBrand(b)}>{b}</button>
              ))}
            </div>
          </div>
        </div>

        <div className="base-meta">
          <span className="num">{results.length}</span> {results.length === 1 ? 'produkt' : (results.length >= 2 && results.length <= 4 ? 'produkty' : 'produktów')}
          {active && <button className="base-clear" onClick={clear}>Wyczyść filtry <IX s={15}/></button>}
        </div>

        {results.length ? (
          <div className="pgrid">
            {results.map(p => <ProductTile key={p.sku} p={p} />)}
          </div>
        ) : (
          <div className="empty">
            <span className="empty-ic"><IGrid s={30}/></span>
            <h3 className="why-t">Brak wyników</h3>
            <p className="why-d">Nie znaleźliśmy produktów dla tych filtrów. Zmień zapytanie lub wyczyść filtry.</p>
            <button className="btn btn-ghost" onClick={clear}>Wyczyść filtry</button>
          </div>
        )}
      </div>
    </section>
  );
}

const TWEAK_DEFAULTS = { hero: 'Granat', accent: '#F04E23', marquee: true };
const HERO_KEY = { 'Granat': 'navy', 'Split': 'split', 'Plakat': 'poster' };

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((ents) => {
      ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const catRef = useRef(null);

  useEffect(() => {
    document.documentElement.style.setProperty('--flame', t.accent);
    document.documentElement.style.setProperty('--flame-glow', t.accent);
  }, [t.accent]);

  useReveal();

  const pickCat = (c) => {
    if (catRef.current) catRef.current(c);
    requestAnimationFrame(() => {
      const el = document.getElementById('baza');
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' });
    });
  };

  return (
    <React.Fragment>
      <Header />
      <Hero variant={HERO_KEY[t.hero] || 'navy'} />
      {t.marquee && <Marquee />}
      <WhyUs />
      <Process />
      <Categories onPick={pickCat} />
      <ProductDatabase initialCatRef={catRef} />
      <Contact />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Strona główna (hero)" />
        <TweakRadio label="Wariant hero" value={t.hero} options={['Granat', 'Split', 'Plakat']} onChange={(v) => setTweak('hero', v)} />
        <TweakColor label="Kolor akcentu" value={t.accent} options={['#F04E23', '#E5421A', '#1E3FB5', '#0E1533']} onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="Pasek marek (marquee)" value={t.marquee} onChange={(v) => setTweak('marquee', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
