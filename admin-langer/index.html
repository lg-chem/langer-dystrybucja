<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Langer Dystrybucja</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
  --flame: #F04E23; --flame-600: #D63F18; --flame-tint: #FBE7DF;
  --navy: #0E1533; --navy-800: #161E45; --navy-900: #080C22;
  --cobalt: #1E3FB5; --ash: #8B9199; --ash-700: #565D67;
  --light: #EEF0F3; --paper: #F6F7F9; --white: #FFFFFF;
  --line: #E2E5EA; --line-2: #CFD4DC;
  --green: #16A34A; --green-tint: #DCFCE7;
  --red: #DC2626; --red-tint: #FEE2E2;
  --amber: #D97706; --amber-tint: #FEF3C7;
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-text: 'Hanken Grotesk', Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --e2: 0 4px 16px -4px rgb(14 21 51 / 0.12), 0 2px 4px -1px rgb(14 21 51 / 0.06);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100vh; }
body { background: var(--paper); color: var(--navy); font-family: var(--font-text); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; }
a { color: inherit; }

.adm-hdr { background: var(--navy); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.adm-hdr-l { display: flex; align-items: center; gap: 16px; }
.adm-hdr-title { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }
.adm-hdr-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; color: rgba(255,255,255,.55); text-transform: uppercase; }
.adm-hdr-btn { padding: 8px 14px; border-radius: var(--r-sm); font-size: 13px; font-weight: 600; color: rgba(255,255,255,.85); border: 1px solid rgba(255,255,255,.18); display: inline-flex; align-items: center; gap: 6px; }
.adm-hdr-btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.4); }

.adm-tabs { background: var(--white); border-bottom: 1px solid var(--line); padding: 0 24px; display: flex; gap: 4px; }
.adm-tab { padding: 16px 18px; font-size: 14px; font-weight: 600; color: var(--ash-700); border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 8px; }
.adm-tab:hover { color: var(--navy); }
.adm-tab.active { color: var(--navy); border-bottom-color: var(--flame); }

.adm-main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
.adm-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 28px; }
.adm-card + .adm-card { margin-top: 20px; }
.adm-card-h { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; margin: 0 0 8px; }
.adm-card-d { color: var(--ash-700); font-size: 14px; margin: 0 0 20px; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: var(--r-sm); transition: background .12s; white-space: nowrap; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-flame { background: var(--flame); color: #fff; }
.btn-flame:hover:not(:disabled) { background: var(--flame-600); }
.btn-ghost { background: var(--white); color: var(--navy); border: 1.5px solid var(--line-2); }
.btn-ghost:hover:not(:disabled) { border-color: var(--navy); }
.btn-icon { width: 32px; height: 32px; padding: 0; border-radius: var(--r-sm); color: var(--ash); }
.btn-icon:hover:not(:disabled) { color: var(--red); background: var(--red-tint); }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 600; color: var(--ash-700); letter-spacing: 0.04em; text-transform: uppercase; }
.field input, .field select { font-size: 15px; padding: 10px 12px; border: 1.5px solid var(--line-2); border-radius: var(--r-sm); background: var(--white); color: var(--navy); transition: border-color .15s, box-shadow .15s; }
.field input:focus, .field select:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(14,21,51,.08); }

.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(180deg, var(--navy) 0%, var(--navy-900) 100%); }
.login-card { background: var(--white); border-radius: var(--r-lg); padding: 36px; max-width: 420px; width: 100%; box-shadow: 0 24px 48px -16px rgba(0,0,0,.4); }
.login-h { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -0.02em; margin: 8px 0 6px; }
.login-d { color: var(--ash-700); font-size: 14.5px; margin: 0 0 24px; }
.login-help { font-size: 12.5px; color: var(--ash); margin: 6px 0 0; line-height: 1.4; }
.login-err { background: var(--red-tint); color: var(--red); padding: 10px 14px; border-radius: var(--r-sm); font-size: 13.5px; margin-bottom: 16px; }

.drop { border: 2px dashed var(--line-2); border-radius: var(--r-lg); padding: 40px 24px; text-align: center; transition: background .15s, border-color .15s; }
.drop.over { background: var(--flame-tint); border-color: var(--flame); }
.drop-i { width: 56px; height: 56px; border-radius: 50%; background: var(--light); color: var(--ash-700); display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.drop-h { font-weight: 600; font-size: 16px; margin: 0 0 6px; }
.drop-d { color: var(--ash-700); font-size: 13.5px; margin: 0 0 16px; }

.tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--r-md); margin-top: 16px; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl th { background: var(--light); padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ash-700); border-bottom: 1px solid var(--line); white-space: nowrap; }
table.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
table.tbl tr:last-child td { border-bottom: none; }
table.tbl tr.invalid td { background: var(--red-tint); }
.tag-bad { display: inline-block; background: var(--red-tint); color: var(--red); font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; margin-left: 4px; }
.tag-ok  { display: inline-block; background: var(--green-tint); color: var(--green); font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }

.progress { margin-top: 16px; padding: 16px; background: var(--light); border-radius: var(--r-md); font-size: 13.5px; }
.progress-bar { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 8px 0 12px; }
.progress-bar-i { height: 100%; background: var(--flame); transition: width .3s; }
.progress-log { font-family: var(--font-mono); font-size: 12px; color: var(--ash-700); max-height: 200px; overflow-y: auto; background: var(--white); padding: 10px; border-radius: var(--r-sm); border: 1px solid var(--line); }
.progress-log .ok { color: var(--green); }
.progress-log .err { color: var(--red); }

.p-img { width: 40px; height: 40px; border-radius: var(--r-sm); background: var(--light); object-fit: cover; }

.alert { padding: 12px 16px; border-radius: var(--r-sm); font-size: 13.5px; margin-bottom: 16px; }
.alert-info { background: #E5E9F8; color: #1E3FB5; }
.alert-ok { background: var(--green-tint); color: var(--green); }

.muted { color: var(--ash); font-size: 13px; }
.mono { font-family: var(--font-mono); font-size: 12.5px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.flex-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.gap-2 { display: flex; gap: 8px; }
.gap-3 { display: flex; gap: 12px; }

.modal-bg { position: fixed; inset: 0; background: rgba(8,12,34,.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--white); border-radius: var(--r-lg); padding: 28px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-h { font-family: var(--font-display); font-weight: 700; font-size: 20px; margin: 0 0 16px; }

@media (max-width: 720px) {
  .adm-tab { padding: 14px 12px; font-size: 13px; }
}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   KONFIGURACJA
   ============================================================ */
const BRANDS = ['Soudal', 'Tytan', 'Penosil', 'Langer', 'Den Braven'];
const CATEGORIES = [
  { id: 'piany',     label: 'Piany montażowe' },
  { id: 'silikony',  label: 'Silikony' },
  { id: 'akryle',    label: 'Akryle' },
  { id: 'kleje',     label: 'Kleje' },
  { id: 'akcesoria', label: 'Akcesoria' },
];
const CAT_IDS = CATEGORIES.map(c => c.id);
const ROLES = [
  { id: 'magnet',  label: 'Bestseller' },
  { id: 'margin',  label: 'Marka własna' },
  { id: 'premium', label: 'Premium' },
  { id: 'neutral', label: 'Bez oznaczenia' },
];
const ROLE_IDS = ROLES.map(r => r.id);

/* ============================================================
   API HELPERS
   ============================================================ */
function getSecret() { return localStorage.getItem('admin_secret') || ''; }

async function apiCall(path, options = {}) {
  const secret = getSecret();
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (secret) headers.Authorization = `Bearer ${secret}`;
  const res = await fetch(path, { ...options, headers });
  const text = await res.text();
  let data;
  try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text }; }
  if (!res.ok) {
    const err = new Error(data.error || `Błąd ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return data;
}

async function apiList()                  { return apiCall('/api/products'); }
async function apiCreate(p)               { return apiCall('/api/products', { method: 'POST', body: JSON.stringify(p) }); }
async function apiUpdate(sku, p)          { return apiCall(`/api/products/${encodeURIComponent(sku)}`, { method: 'PUT', body: JSON.stringify(p) }); }
async function apiDelete(sku)             { return apiCall(`/api/products/${encodeURIComponent(sku)}`, { method: 'DELETE' }); }

/* ============================================================
   ICONS
   ============================================================ */
const Svg = ({ s = 18, children, style }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>
);
const IUpload = (p) => <Svg {...p}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></Svg>;
const ITrash  = (p) => <Svg {...p}><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></Svg>;
const IList   = (p) => <Svg {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></Svg>;
const IPlus   = (p) => <Svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>;
const ILogout = (p) => <Svg {...p}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></Svg>;
const IRefresh = (p) => <Svg {...p}><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></Svg>;
const IDownload = (p) => <Svg {...p}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></Svg>;
const IEdit = (p) => <Svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></Svg>;
const IX = (p) => <Svg {...p}><path d="M6 6l12 12M18 6L6 18"/></Svg>;

/* ============================================================
   LOGIN — wpisujesz tylko ADMIN_SECRET (env var z Vercela)
   ============================================================ */
function Login({ onLogin }) {
  const [secret, setSecret] = useState(getSecret());
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr('');
    if (!secret) { setErr('Wpisz ADMIN_SECRET'); return; }
    setLoading(true);
    localStorage.setItem('admin_secret', secret);
    try {
      // test: spróbuj utworzyć fałszywy "ping" POST z bad body — jeśli 400 to autoryzacja OK,
      // jeśli 401 to zły secret.
      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${secret}` },
        body: JSON.stringify({})  // brak wymaganych pól -> 400 jeśli secret OK
      });
      if (res.status === 401) {
        localStorage.removeItem('admin_secret');
        throw new Error('Niepoprawny ADMIN_SECRET');
      }
      onLogin();
    } catch (e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
          <rect x="13" y="7" width="11" height="35" rx="5.5" fill="var(--navy)" />
          <rect x="18.5" y="38" width="6" height="10" rx="3" fill="var(--navy)" />
          <rect x="13" y="46" width="42" height="13" rx="6.5" fill="var(--flame)" />
        </svg>
        <h1 className="login-h">Panel admina</h1>
        <p className="login-d">Langer Dystrybucja — strefa wewnętrzna</p>

        {err && <div className="login-err">{err}</div>}

        <div className="field">
          <label>ADMIN_SECRET</label>
          <input type="password" value={secret} onChange={e => setSecret(e.target.value)} required autoFocus />
          <p className="login-help">
            Ten sam ciąg co w Vercel Environment Variables → <code>ADMIN_SECRET</code>.
          </p>
        </div>

        <button type="submit" className="btn btn-flame" style={{ width: '100%', padding: 14 }} disabled={loading}>
          {loading ? <><span className="spinner"/> Sprawdzam...</> : 'Zaloguj się'}
        </button>
      </form>
    </div>
  );
}

/* ============================================================
   POMOCNICZE — walidacja i normalizacja produktu
   ============================================================ */
function parseTags(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  return String(raw).split(/[|;]/).map(s => s.trim()).filter(Boolean);
}

function validateRow(row) {
  const errors = [];
  if (!row.sku || !String(row.sku).trim()) errors.push('brak SKU');
  if (!row.name || !String(row.name).trim()) errors.push('brak nazwy');
  if (!row.brand || !BRANDS.includes(String(row.brand).trim())) errors.push(`marka: ${BRANDS.join(', ')}`);
  if (!row.category || !CAT_IDS.includes(String(row.category).trim().toLowerCase())) errors.push(`kategoria: ${CAT_IDS.join(', ')}`);
  if (row.role && !ROLE_IDS.includes(String(row.role).trim().toLowerCase())) errors.push(`role: ${ROLE_IDS.join(', ')}`);
  return errors;
}

function normalizeRow(row) {
  return {
    sku: String(row.sku || '').trim(),
    name: String(row.name || '').trim(),
    brand: String(row.brand || '').trim(),
    category: String(row.category || '').trim().toLowerCase(),
    variant: String(row.variant || '').trim() || null,
    pack: String(row.pack || '').trim() || null,
    role: String(row.role || 'neutral').trim().toLowerCase() || 'neutral',
    tags: parseTags(row.tags),
    image_url: String(row.image_url || row.image || '').trim() || null,
  };
}

/* ============================================================
   CSV IMPORT
   ============================================================ */
function CsvImport({ onDone }) {
  const [rows, setRows] = useState([]);
  const [filename, setFilename] = useState('');
  const [over, setOver] = useState(false);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(0);
  const [total, setTotal] = useState(0);
  const [log, setLog] = useState([]);
  const fileRef = useRef(null);

  function pushLog(msg, kind = '') { setLog(l => [...l, { msg, kind }]); }

  function handleFile(file) {
    if (!file) return;
    setFilename(file.name);
    setLog([]); setDone(0); setTotal(0);
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      transformHeader: h => h.trim().toLowerCase(),
      complete: (results) => {
        const parsed = results.data.map((row, i) => {
          const normalized = normalizeRow(row);
          const errors = validateRow(normalized);
          return { ...normalized, _idx: i + 1, _errors: errors };
        });
        setRows(parsed);
      },
      error: (err) => alert('Błąd parsowania CSV: ' + err.message)
    });
  }

  function onDrop(e) {
    e.preventDefault(); setOver(false);
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  }

  async function importAll() {
    const valid = rows.filter(r => r._errors.length === 0);
    if (!valid.length) { alert('Brak prawidłowych wierszy do importu.'); return; }
    setRunning(true);
    setTotal(valid.length); setDone(0); setLog([]);
    for (let i = 0; i < valid.length; i++) {
      const r = valid[i];
      const data = {
        sku: r.sku, name: r.name, brand: r.brand, category: r.category,
        variant: r.variant, pack: r.pack, role: r.role, tags: r.tags, image_url: r.image_url
      };
      try {
        await apiCreate(data);
        pushLog(`✓ ${r.sku} — ${r.name}`, 'ok');
      } catch (e) {
        pushLog(`✗ ${r.sku} — ${e.message}`, 'err');
      }
      setDone(i + 1);
    }
    setRunning(false);
    pushLog(`Gotowe. Strona aktualna natychmiast.`, '');
    if (onDone) onDone();
  }

  const validCount = rows.filter(r => r._errors.length === 0).length;
  const invalidCount = rows.length - validCount;

  return (
    <div className="adm-card">
      <h2 className="adm-card-h">Import produktów z CSV</h2>
      <p className="adm-card-d">
        Wgraj plik CSV. Wymagane kolumny: <span className="mono">sku, name, brand, category</span>. Opcjonalne: <span className="mono">variant, pack, role, tags, image_url</span>.
        Tagi dziel pionową kreską <span className="mono">|</span>, np. <span className="mono">Pistoletowa|Całoroczna</span>.
        Jeśli SKU już istnieje — produkt zostanie nadpisany.
      </p>

      <div className="gap-3" style={{ marginBottom: 14 }}>
        <button className="btn btn-ghost" onClick={() => downloadCsvTemplate()}>
          <IDownload s={16}/> Pobierz szablon CSV
        </button>
      </div>

      <div
        className={'drop' + (over ? ' over' : '')}
        onDragOver={e => { e.preventDefault(); setOver(true); }}
        onDragLeave={() => setOver(false)}
        onDrop={onDrop}
        onClick={() => fileRef.current && fileRef.current.click()}
        style={{ cursor: 'pointer' }}
      >
        <div className="drop-i"><IUpload s={26}/></div>
        <p className="drop-h">{filename ? filename : 'Przeciągnij CSV tutaj lub kliknij'}</p>
        <p className="drop-d">obsługujemy .csv (oddzielony przecinkami, UTF-8)</p>
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
      </div>

      {rows.length > 0 && (
        <>
          <div className="flex-between" style={{ marginTop: 24 }}>
            <div>
              <strong>{rows.length}</strong> wierszy ·{' '}
              <span style={{ color: 'var(--green)' }}>{validCount} OK</span>
              {invalidCount > 0 && <> · <span style={{ color: 'var(--red)' }}>{invalidCount} z błędami</span></>}
            </div>
            <button className="btn btn-flame" onClick={importAll} disabled={running || !validCount}>
              {running ? <><span className="spinner"/> Importuję {done}/{total}...</> : `Importuj ${validCount} produktów →`}
            </button>
          </div>

          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th>#</th><th>SKU</th><th>Nazwa</th><th>Marka</th><th>Kategoria</th><th>Status</th></tr></thead>
              <tbody>
                {rows.slice(0, 50).map(r => (
                  <tr key={r._idx} className={r._errors.length ? 'invalid' : ''}>
                    <td className="mono">{r._idx}</td>
                    <td className="mono">{r.sku || '—'}</td>
                    <td>{r.name || '—'}</td>
                    <td>{r.brand || '—'}</td>
                    <td>{r.category || '—'}</td>
                    <td>
                      {r._errors.length === 0
                        ? <span className="tag-ok">OK</span>
                        : <span className="tag-bad" title={r._errors.join('; ')}>błąd: {r._errors[0]}</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {rows.length > 50 && <p className="muted" style={{ padding: '10px 14px' }}>(podgląd pierwszych 50, importujemy wszystkie {rows.length})</p>}
          </div>
        </>
      )}

      {(running || log.length > 0) && (
        <div className="progress">
          {running && <>
            <strong>{done} / {total}</strong>
            <div className="progress-bar"><div className="progress-bar-i" style={{ width: `${(done / Math.max(total, 1)) * 100}%` }} /></div>
          </>}
          <div className="progress-log">
            {log.map((l, i) => <div key={i} className={l.kind}>{l.msg}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

function downloadCsvTemplate() {
  const csv = [
    'sku,name,brand,category,variant,pack,role,tags,image_url',
    'TEST-001,Soudal Classic Premium 870 ml,Soudal,piany,Pistoletowa · 870 ml,12 szt. / karton,magnet,Pistoletowa|Premium,https://przyklad.pl/zdjecie1.jpg',
    'TEST-002,Langer Akryl Pro 300 ml,Langer,akryle,Malarski · 300 ml,24 szt. / karton,margin,Marka własna|Malarski,',
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'szablon-produkty.csv'; a.click();
  URL.revokeObjectURL(url);
}

/* ============================================================
   FORMULARZ POJEDYNCZEGO PRODUKTU (dodanie / edycja)
   ============================================================ */
function ProductForm({ initial, onSave, onCancel }) {
  const isEdit = !!initial;
  const [p, setP] = useState(initial || {
    sku: '', name: '', brand: 'Soudal', category: 'piany',
    variant: '', pack: '', role: 'neutral', tags: [], image_url: ''
  });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  function set(k, v) { setP({ ...p, [k]: v }); }

  async function submit(e) {
    e.preventDefault();
    setErr('');
    if (!p.sku || !p.name) { setErr('SKU i nazwa są wymagane.'); return; }
    setSaving(true);
    try {
      const body = {
        ...p,
        sku: p.sku.trim(),
        name: p.name.trim(),
        variant: p.variant || null,
        pack: p.pack || null,
        image_url: p.image_url || null,
        tags: Array.isArray(p.tags) ? p.tags : parseTags(p.tags),
      };
      if (isEdit) {
        await apiUpdate(initial.sku, body);
      } else {
        await apiCreate(body);
      }
      onSave();
    } catch (e) {
      setErr(e.message);
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="modal-bg" onClick={onCancel}>
      <form className="modal" onClick={e => e.stopPropagation()} onSubmit={submit}>
        <h3 className="modal-h">{isEdit ? `Edytuj: ${initial.sku}` : 'Nowy produkt'}</h3>

        {err && <div className="login-err">{err}</div>}

        <div className="field">
          <label>SKU *</label>
          <input value={p.sku} onChange={e => set('sku', e.target.value)} disabled={isEdit} required style={{ fontFamily: 'var(--font-mono)' }} />
        </div>
        <div className="field">
          <label>Nazwa *</label>
          <input value={p.name} onChange={e => set('name', e.target.value)} required />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <div className="field">
            <label>Marka *</label>
            <select value={p.brand} onChange={e => set('brand', e.target.value)} required>
              {BRANDS.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Kategoria *</label>
            <select value={p.category} onChange={e => set('category', e.target.value)} required>
              {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
        </div>

        <div className="field">
          <label>Wariant / pojemność</label>
          <input value={p.variant || ''} onChange={e => set('variant', e.target.value)} placeholder="np. Pistoletowa · 750 ml" />
        </div>
        <div className="field">
          <label>Jednostka sprzedaży</label>
          <input value={p.pack || ''} onChange={e => set('pack', e.target.value)} placeholder="np. 12 szt. / karton" />
        </div>

        <div className="field">
          <label>Oznaczenie</label>
          <select value={p.role || 'neutral'} onChange={e => set('role', e.target.value)}>
            {ROLES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
        </div>

        <div className="field">
          <label>Tagi (oddziel pionowymi kreskami)</label>
          <input
            value={Array.isArray(p.tags) ? p.tags.join('|') : (p.tags || '')}
            onChange={e => set('tags', e.target.value.split('|').map(s => s.trim()).filter(Boolean))}
            placeholder="np. Pistoletowa|Całoroczna"
          />
        </div>

        <div className="field">
          <label>URL zdjęcia (opcjonalne)</label>
          <input value={p.image_url || ''} onChange={e => set('image_url', e.target.value)} placeholder="https://..." />
        </div>

        <div className="gap-2" style={{ marginTop: 20, justifyContent: 'flex-end' }}>
          <button type="button" className="btn btn-ghost" onClick={onCancel} disabled={saving}>Anuluj</button>
          <button type="submit" className="btn btn-flame" disabled={saving}>
            {saving ? <><span className="spinner"/> Zapisuję...</> : 'Zapisz'}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ============================================================
   LISTA PRODUKTÓW + USUWANIE + EDYCJA
   ============================================================ */
function ProductList({ refreshTrigger }) {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [q, setQ] = useState('');
  const [busy, setBusy] = useState(null);
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);

  async function reload() {
    setLoading(true); setErr('');
    try {
      const list = await apiList();
      setProducts(list);
    } catch (e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  useEffect(() => { reload(); }, [refreshTrigger]);

  async function handleDelete(p) {
    if (!confirm(`Usunąć produkt "${p.name}"?\nTo akcja nieodwracalna.`)) return;
    setBusy(p.sku);
    try {
      await apiDelete(p.sku);
      setProducts(products.filter(x => x.sku !== p.sku));
    } catch (e) {
      alert('Błąd: ' + e.message);
    } finally {
      setBusy(null);
    }
  }

  const filtered = useMemo(() => {
    if (!q.trim()) return products;
    const term = q.trim().toLowerCase();
    return products.filter(p =>
      (p.sku + ' ' + p.name + ' ' + p.brand + ' ' + p.category).toLowerCase().includes(term)
    );
  }, [products, q]);

  return (
    <div className="adm-card">
      <div className="flex-between">
        <div>
          <h2 className="adm-card-h">Lista produktów ({products.length})</h2>
          <p className="adm-card-d">Edytuj, usuwaj, dodawaj pojedyncze produkty. Zmiany natychmiast widoczne na stronie.</p>
        </div>
        <div className="gap-2">
          <button className="btn btn-ghost" onClick={reload} disabled={loading}>
            <IRefresh s={16}/> {loading ? 'Ładuję...' : 'Odśwież'}
          </button>
          <button className="btn btn-flame" onClick={() => setAdding(true)}>
            <IPlus s={16}/> Nowy produkt
          </button>
        </div>
      </div>

      {err && <div className="login-err">{err}</div>}

      <input
        value={q}
        onChange={e => setQ(e.target.value)}
        placeholder="Szukaj: SKU, nazwa, marka, kategoria..."
        style={{ width: '100%', padding: '10px 14px', border: '1.5px solid var(--line-2)', borderRadius: 'var(--r-sm)', fontSize: 15, marginBottom: 14 }}
      />

      {loading ? (
        <p className="muted">Pobieram dane z Neon...</p>
      ) : (
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr><th></th><th>SKU</th><th>Nazwa</th><th>Marka</th><th>Kategoria</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.sku}>
                  <td>
                    {p.image_url
                      ? <img src={p.image_url} alt="" className="p-img" onError={e => e.target.style.display = 'none'} />
                      : <div className="p-img"/>}
                  </td>
                  <td className="mono">{p.sku}</td>
                  <td>{p.name}</td>
                  <td>{p.brand}</td>
                  <td>{p.category}</td>
                  <td style={{ textAlign: 'right' }}>
                    <div className="gap-2" style={{ justifyContent: 'flex-end' }}>
                      <button className="btn-icon" onClick={() => setEditing(p)} title="Edytuj" style={{ color: 'var(--cobalt)' }}>
                        <IEdit s={18}/>
                      </button>
                      <button className="btn-icon" onClick={() => handleDelete(p)} disabled={busy === p.sku} title="Usuń">
                        {busy === p.sku ? <span className="spinner"/> : <ITrash s={18}/>}
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && (
                <tr><td colSpan="6" style={{ textAlign: 'center', padding: 40, color: 'var(--ash)' }}>
                  {q ? 'Brak wyników wyszukiwania' : 'Brak produktów'}
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      )}

      {editing && <ProductForm initial={editing} onSave={() => { setEditing(null); reload(); }} onCancel={() => setEditing(null)} />}
      {adding && <ProductForm onSave={() => { setAdding(false); reload(); }} onCancel={() => setAdding(false)} />}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [authed, setAuthed] = useState(!!getSecret());
  const [tab, setTab] = useState('list');
  const [refreshKey, setRefreshKey] = useState(0);

  function logout() {
    if (!confirm('Wylogować się? Token zostanie usunięty z przeglądarki.')) return;
    localStorage.removeItem('admin_secret');
    setAuthed(false);
  }

  if (!authed) return <Login onLogin={() => setAuthed(true)} />;

  return (
    <>
      <header className="adm-hdr">
        <div className="adm-hdr-l">
          <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
            <rect x="13" y="7" width="11" height="35" rx="5.5" fill="#fff" />
            <rect x="18.5" y="38" width="6" height="10" rx="3" fill="#fff" />
            <rect x="13" y="46" width="42" height="13" rx="6.5" fill="var(--flame)" />
          </svg>
          <div>
            <div className="adm-hdr-title">Panel admina</div>
            <div className="adm-hdr-sub">Langer Dystrybucja · Neon DB</div>
          </div>
        </div>
        <div className="gap-2">
          <a className="adm-hdr-btn" href="/" target="_blank" rel="noopener">Zobacz stronę →</a>
          <button className="adm-hdr-btn" onClick={logout}><ILogout s={14}/> Wyloguj</button>
        </div>
      </header>

      <nav className="adm-tabs">
        <button className={'adm-tab' + (tab === 'list' ? ' active' : '')} onClick={() => setTab('list')}>
          <IList s={16}/> Produkty
        </button>
        <button className={'adm-tab' + (tab === 'import' ? ' active' : '')} onClick={() => setTab('import')}>
          <IUpload s={16}/> Import CSV
        </button>
      </nav>

      <main className="adm-main">
        {tab === 'list' && <ProductList refreshTrigger={refreshKey}/>}
        {tab === 'import' && <CsvImport onDone={() => setRefreshKey(k => k + 1)}/>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
